name: build-android
on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: yarn
    - name: Setup ENV file
      run: |
        echo "${{secrets.JS_ENV_B64}}" | base64 --decode > .js.env
        echo "${{secrets.ANDROID_KEYSTORE_B64}}" | base64 --decode > android/keystores/flaskRelease.keystore
    - name: Install dependencies
      run: |
        yarn run setup:expo
        yarn run setup
    - name: Build APK
      run: |
        yarn run build:android:flask
    - name: Archive artifacts
      uses: actions/upload-artifact@v4
      with:
        name: andorid-apk
        path: android/app/build/outputs/**/*.apk